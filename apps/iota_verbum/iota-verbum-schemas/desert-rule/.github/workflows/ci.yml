name: Desert Rule CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -t -test .

      - name: Docker image smoke test
        run: |
          docker run --rm -d -p 8000:8000 --name desert-rule-test -test
          sleep 10
          curl -f http://127.0.0.1:8000/health || (docker logs desert-rule-test && exit 1)
          docker stop desert-rule-test
