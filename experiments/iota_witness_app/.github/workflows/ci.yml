name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
      - name: Ruff
        run: ruff check app tests
      - name: Mypy
        run: mypy app
      - name: Pytest
        run: pytest -q

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package.json
      - name: Install mobile deps
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: ESLint
        run: npm run lint

  store-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Store readiness checks
        run: node scripts/store_check.js
