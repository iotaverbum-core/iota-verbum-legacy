<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Narrative Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #f7f5ef; }
    header { padding: 16px; background: #1f4f46; color: #f5f0dd; }
    main { padding: 12px; }
    svg { width: 100%; height: 72vh; border: 1px solid #d9d3c0; background: #fffdfa; }
    .edge { stroke: #7b7b7b; stroke-opacity: 0.6; }
  </style>
</head>
<body>
  <header>
    <h2>{{ reference }}</h2>
    <p>Nodes: {{ node_count }} | Edges: {{ edge_count }}</p>
  </header>
  <main>
    <svg id="graph"></svg>
  </main>
  <script>
    const payload = {{ graph_json | safe }};
    const nodes = payload.nodes.map((n) => ({...n}));
    const links = payload.edges.map((e) => ({source: e.from_id, target: e.to_id}));
    const svg = d3.select("#graph");
    const width = document.getElementById("graph").clientWidth;
    const height = document.getElementById("graph").clientHeight;
    const color = d3.scaleOrdinal().domain(["identity","enactment","effect","dialogue"]).range(["#264653","#2a9d8f","#e76f51","#f4a261"]);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id).distance(95))
      .force("charge", d3.forceManyBody().strength(-260))
      .force("center", d3.forceCenter(width / 2, height / 2));

    const link = svg.append("g").selectAll("line").data(links).join("line").attr("class", "edge");
    const node = svg.append("g").selectAll("g").data(nodes).join("g");

    node.append("circle").attr("r", 12).attr("fill", (d) => color(d.type));
    node.append("text").attr("x", 15).attr("y", 4).style("font-size", "12px").text((d) => (d.type + ": " + d.text).slice(0, 65));

    simulation.on("tick", () => {
      link.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y).attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
      node.attr("transform", (d) => `translate(${d.x},${d.y})`);
    });
  </script>
</body>
</html>
